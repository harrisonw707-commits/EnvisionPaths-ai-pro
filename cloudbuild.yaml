steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-west1-docker.pkg.dev/envisionpaths/envisionpaths-ai-pro/app:$COMMIT_SHA'
      - '.'

  # Push the container image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-west1-docker.pkg.dev/envisionpaths/envisionpaths-ai-pro/app:$COMMIT_SHA'

  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'envisionpaths-ai-pro'
      - '--image'
      - 'us-west1-docker.pkg.dev/envisionpaths/envisionpaths-ai-pro/app:$COMMIT_SHA'
      - '--region'
      - 'us-west1'
      - '--project'
      - 'envisionpaths'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest'
      - '--set-secrets=STRIPE_SECRET_KEY=STRIPE_SECRET_KEY:latest'
      - '--set-secrets=STRIPE_PRICE_BEGINNER_ID=STRIPE_PRICE_BEGINNER_ID:latest'
      - '--set-secrets=STRIPE_PRICE_PRO_ID=STRIPE_PRICE_PRO_ID:latest'
      - '--set-secrets=APP_URL=APP_URL:latest'

images:
  - 'us-west1-docker.pkg.dev/envisionpaths/envisionpaths-ai-pro/app:$COMMIT_SHA'
